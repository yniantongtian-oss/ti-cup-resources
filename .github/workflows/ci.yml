name: Resource quality

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  audit-tool:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run unit tests
        run: python3 -m unittest discover -s tests -v
      - name: Generate repository audit report
        run: python3 tools/project_audit.py . --output audit-report.md
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: repository-audit-report
          path: audit-report.md
