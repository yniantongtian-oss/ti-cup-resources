name: Resource quality

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unit-tests:
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.8', '3.10', '3.12', '3.13']
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  audit-report:
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Generate repository audit report
        run: python tools/project_audit.py . --output audit-report.md
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: repository-audit-report
          path: audit-report.md
          if-no-files-found: error
